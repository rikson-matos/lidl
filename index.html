<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI - Auditoria Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #0050aa; --yellow: #ffcc00; --red: #df0000; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; flex-direction: column; }
        #header { background: var(--blue); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 350px; border-right: 1px solid #ccc; display: flex; flex-direction: column; background: #f8f9fa; }
        #map { flex: 1; }
        .tab-bar { display: flex; background: #ddd; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; font-weight: bold; border-bottom: 3px solid transparent; }
        .tab.active { background: white; border-bottom-color: var(--yellow); }
        #store-list { flex: 1; overflow-y: auto; padding: 5px; }
        .store-item { background: white; padding: 12px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; border-left: 5px solid #ccc; position: relative; }
        .status-badge { position: absolute; right: 10px; top: 10px; font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:white; width:90%; max-width:450px; padding:20px; border-radius:10px; text-align: center; }
        .btn { padding: 12px; width: 100%; margin: 5px 0; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="header">
    <h3 style="margin:0">Quantum AI PRO</h3>
    <input type="text" id="equipaNome" placeholder="Nome da Equipa" style="padding:5px; border-radius:4px; border:none;">
</div>

<div id="main-container">
    <div id="sidebar">
        <div class="tab-bar">
            <div class="tab active" onclick="renderLojas('todas')">TODAS</div>
            <div class="tab" onclick="renderLojas('perto')">PERTO</div>
            <div class="tab" onclick="renderLojas('curso')">EM CURSO</div>
        </div>
        <div id="store-list">Carregando lojas...</div>
    </div>
    <div id="map"></div>
</div>

<div id="modalTrabalho" class="modal">
    <div class="modal-box">
        <h2 id="m-nome">Loja</h2>
        <div id="timer" style="font-size: 30px; margin: 15px 0; color: var(--blue);">00:00:00</div>
        <div id="status-info" style="margin-bottom: 10px; font-size: 14px; color: #666;"></div>
        <button class="btn" style="background: green; color:white;" id="btnStart" onclick="dbAction('start')">INICIAR TRABALHO</button>
        <button class="btn" style="background: orange;" id="btnPause" onclick="dbAction('pause')">PAUSA / ALMOÇO</button>
        <button class="btn" style="background: red; color:white;" id="btnFinish" onclick="dbAction('finish')">FINALIZAR (3 FOTOS)</button>
        <button class="btn" style="background: #ccc;" onclick="closeModal()">FECHAR</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // Configuração do Firebase que enviaste
    const firebaseConfig = {
        apiKey: "AIzaSyBdQpPtOWd6kPZfa0ofvrjpoa-XqXgP_tY",
        authDomain: "lidl-audit.firebaseapp.com",
        databaseURL: "https://lidl-audit-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lidl-audit",
        storageBucket: "lidl-audit.firebasestorage.app",
        messagingSenderId: "913435364403",
        appId: "1:913435364403:web:b46e176fd05ad7daaa6746"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map').setView([39.5, -8.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let baseLojas = [];
    let statusRealtime = {};
    let lojaAtiva = null;
    let userLoc = null;

    // Carregar CSV
    Papa.parse("https://raw.githubusercontent.com/rikson-matos/lidl/main/lista_final.csv", {
        download: true, header: true, complete: function(results) {
            baseLojas = results.data;
            iniciarSincronizacao();
        }
    });

    function iniciarSincronizacao() {
        db.ref('trabalhos').on('value', snapshot => {
            statusRealtime = snapshot.val() || {};
            renderLojas();
        });
    }

    function renderLojas(filtro = 'todas') {
        const container = document.getElementById('store-list');
        container.innerHTML = '';
        
        baseLojas.forEach((loja, index) => {
            const id = "loja_" + index;
            const status = statusRealtime[id] || { estado: 'LIVRE' };
            
            if(filtro === 'curso' && status.estado === 'LIVRE') return;

            const div = document.createElement('div');
            div.className = 'store-item';
            div.style.borderLeftColor = status.estado === 'EM_CURSO' ? 'orange' : (status.estado === 'CONCLUIDO' ? 'green' : '#ccc');
            div.innerHTML = `<b>${loja.Nome}</b><br><small>${loja.Morada}</small>
                             <span class="status-badge" style="background:${status.estado === 'EM_CURSO' ? 'var(--yellow)' : '#eee'}">${status.estado}</span>`;
            div.onclick = () => abrirLoja(id, loja);
            container.appendChild(div);
        });
    }

    function abrirLoja(id, loja) {
        lojaAtiva = { id, ...loja };
        document.getElementById('m-nome').innerText = loja.Nome;
        document.getElementById('modalTrabalho').style.display = 'flex';
        const status = statusRealtime[id] || {};
        document.getElementById('status-info').innerText = status.equipa ? `Pela equipa: ${status.equipa}` : "Livre para iniciar";
    }

    function dbAction(acao) {
        const equipa = document.getElementById('equipaNome').value;
        if(!equipa) return alert("Escreve o nome da tua equipa!");
        
        const ref = db.ref('trabalhos/' + lojaAtiva.id);
        if(acao === 'start') {
            ref.set({ estado: 'EM_CURSO', equipa: equipa, inicio: Date.now() });
        } else if(acao === 'finish') {
            ref.update({ estado: 'CONCLUIDO', fim: Date.now() });
            alert("Trabalho Concluído! Não esqueças as 3 fotos.");
            closeModal();
        }
    }

    function closeModal() { document.getElementById('modalTrabalho').style.display = 'none'; }
</script>
</body>
</html>
