<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIDL - Auditoria Fase 2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --blue: #0050aa; --yellow: #ffcc00; --red: #df0000; --green: #28a745; --dark: #333; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; overflow: hidden; }
        #header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .stats-bar { display: flex; background: white; padding: 10px; border-bottom: 2px solid var(--yellow); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-item { text-align: center; flex: 1; font-size: 11px; color: #666; }
        .stat-val { font-weight: bold; font-size: 16px; display: block; color: var(--blue); }
        #map { height: calc(100vh - 170px); width: 100%; }
        #store-list { height: calc(100vh - 170px); overflow-y: auto; display: none; background: white; }
        .store-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; height: 60px; z-index: 1000; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: none; font-size: 12px; color: #888; font-weight: bold; }
        .tab.active { color: var(--blue); border-top: 3px solid var(--blue); background: #f9f9f9; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: white; width: 85%; max-width: 400px; padding: 25px; border-radius: 15px; text-align: center; }
        .badge { background: #fff3cd; border: 2px dashed #ffc107; padding: 15px; margin: 15px 0; border-radius: 10px; font-size: 22px; font-weight: bold; color: #856404; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div id="header">LIDL FASE 2 <span>V.2.1</span></div>

<div class="stats-bar">
    <div class="stat-item"><span class="stat-val" id="stat-total">0</span>LOJAS</div>
    <div class="stat-item"><span class="stat-val" id="stat-feitas" style="color:var(--green)">0</span>CONCLUÍDAS</div>
    <div class="stat-item"><span class="stat-val" id="stat-pct">0%</span>PROGRESSO</div>
</div>

<div id="map"></div>
<div id="store-list"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="m-nome">Carregando...</h3>
        <p id="m-morada" style="font-size: 13px; color: #666;"></p>
        <div class="badge"><small style="font-size: 10px; display: block; margin-bottom: 5px;">ID POSTO (ETIQUETA):</small><span id="m-posto">---</span></div>
        <button class="btn" style="background: var(--blue); color: white;" onclick="abrirRota()">🧭 ABRIR NO GPS</button>
        <button id="btn-acao" class="btn" style="background: var(--green); color: white;" onclick="marcarFeito()">✅ MARCAR COMO CONCLUÍDO</button>
        <button class="btn" style="background: #eee; color: #333;" onclick="fecharModal()">FECHAR</button>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('mapa', this)">🗺️ MAPA</button>
    <button class="tab" onclick="switchTab('lista', this)">📋 LISTA</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // CONFIGURAÇÃO FIREBASE (COM OS TEUS DADOS)
    const firebaseConfig = {
        apiKey: "AIzaSyBdQpPtOWd6kPZfa0ofvrjpoa-XqXgP_tY",
        authDomain: "lidl-audit.firebaseapp.com",
        databaseURL: "https://lidl-audit-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lidl-audit",
        storageBucket: "lidl-audit.firebasestorage.app",
        messagingSenderId: "913435364403",
        appId: "1:913435364403:web:b46e176fd05ad7daaa6746"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DADOS DAS LOJAS (Inseridos direto para não depender do CSV externo)
    const lojas = [
        {id:"119", n:"Amadora - Angola", p:"AMD-00109", lat:38.7592, lon:-9.2438, m:"R de Angola, n13"},
        {id:"125", n:"Loures", p:"LRS-00147", lat:38.8266, lon:-9.1652, m:"Vinha Grande Areeira"},
        {id:"127", n:"Loures - Portela", p:"LRS-00145", lat:38.7851, lon:-9.1167, m:"Qta da Vitória"},
        {id:"129", n:"Sintra - Tapada", p:"SNT-00192", lat:38.8003, lon:-9.3257, m:"Estrada de Mercês"},
        {id:"134", n:"Sintra - Cacém", p:"SNT-00193", lat:38.7627, lon:-9.3070, m:"Rua da Bela vista 31"},
        {id:"141", n:"Odivelas - Caneças", p:"ODV-00049", lat:38.8144, lon:-9.2149, m:"Estrada de Montemor"},
        {id:"142", n:"VFX - Póvoa Sta Iria", p:"VFX-00098", lat:38.8522, lon:-9.0744, m:"EN 10, km 134,7"},
        {id:"144", n:"VFX - Alverca", p:"VFX-00097", lat:38.8920, lon:-9.0387, m:"R de Santa Maria"},
        {id:"149", n:"Lisboa - Xabregas", p:"LSB-00979", lat:38.7252, lon:-9.1122, m:"R Bispo de Coxim"},
        {id:"153", n:"Cascais - Alcoitão", p:"CSC-00415", lat:38.7352, lon:-9.3977, m:"Av da República"},
        {id:"157", n:"Salvaterra de Magos", p:"SMG-00014", lat:39.0225, lon:-8.7939, m:"EN 118"},
        {id:"158", n:"Sassoeiros", p:"CSC-00416", lat:38.7016, lon:-9.3269, m:"R Luis de Camões"},
        {id:"159", n:"Odivelas - Arroja", p:"ODV-00050", lat:38.7957, lon:-9.1987, m:"Av das Acácias"},
        {id:"173", n:"Lisboa - Infante D. H.", p:"LSB-00977", lat:38.7575, lon:-9.1036, m:"Av Infante D Henrique"},
        {id:"174", n:"Coruche", p:"CCH-00007", lat:38.9610, lon:-8.5201, m:"Quinta das Baleias"},
        {id:"177", n:"Oeiras - Algés", p:"OER-00254", lat:38.7061, lon:-9.2383, m:"R João Chagas, 130"},
        {id:"179", n:"Sintra - Algueirão", p:"SNT-00198", lat:38.8044, lon:-9.3561, m:"Casal Vale do Milho"},
        {id:"186", n:"Sintra - Terrugem", p:"SNT-00197", lat:38.8443, lon:-9.3758, m:"Av 29 de Agosto"},
        // Podes adicionar mais aqui seguindo o mesmo padrão
    ];

    let map, markers = {}, statusRealtime = {}, lojaAtiva = null;

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([38.75, -9.15], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        lojas.forEach(s => {
            const m = L.circleMarker([s.lat, s.lon], {
                radius: 10, color: 'white', weight: 2, fillColor: '#df0000', fillOpacity: 0.9
            }).addTo(map);
            m.on('click', () => abrirLoja(s));
            markers[s.id] = m;
        });

        ouvirFirebase();
    }

    function ouvirFirebase() {
        db.ref('fase2').on('value', snap => {
            statusRealtime = snap.val() || {};
            atualizarUI();
        });
    }

    function atualizarUI() {
        let feitas = 0;
        lojas.forEach(s => {
            const isFeito = statusRealtime[s.id] === 'OK';
            if(isFeito) {
                feitas++;
                if(markers[s.id]) markers[s.id].setStyle({fillColor: '#28a745'});
            }
        });

        document.getElementById('stat-total').innerText = lojas.length;
        document.getElementById('stat-feitas').innerText = feitas;
        document.getElementById('stat-pct').innerText = Math.round((feitas/lojas.length)*100) + '%';

        document.getElementById('store-list').innerHTML = lojas.map(s => `
            <div class="store-card" onclick='abrirLoja(${JSON.stringify(s)})'>
                <div><strong>${s.id} - ${s.n}</strong><br><small>${s.p}</small></div>
                <div style="color:${statusRealtime[s.id] === 'OK' ? 'green' : '#ccc'}">●</div>
            </div>
        `).join('');
    }

    function abrirLoja(s) {
        lojaAtiva = s;
        document.getElementById('m-nome').innerText = s.n;
        document.getElementById('m-morada').innerText = s.m;
        document.getElementById('m-posto').innerText = s.p;
        document.getElementById('modal').style.display = 'flex';
    }

    function marcarFeito() {
        if(lojaAtiva) {
            db.ref('fase2/' + lojaAtiva.id).set('OK');
            fecharModal();
        }
    }

    function abrirRota() {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lojaAtiva.lat},${lojaAtiva.lon}`);
    }

    function fecharModal() { document.getElementById('modal').style.display = 'none'; }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('map').style.display = tab === 'mapa' ? 'block' : 'none';
        document.getElementById('store-list').style.display = tab === 'lista' ? 'block' : 'none';
        if(tab === 'mapa') map.invalidateSize();
    }

    window.onload = initMap;
</script>
</body>
</html>
