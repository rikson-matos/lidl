<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>LIDL Auditoria - Quantum AI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --blue: #0050aa; --yellow: #ffcc00; --red: #df0000; --green: #28a745; --dark: #333; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; overflow: hidden; }
        #header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .stats-bar { display: flex; background: white; padding: 10px; border-bottom: 2px solid var(--yellow); }
        .stat-item { text-align: center; flex: 1; font-size: 11px; color: #666; }
        .stat-val { font-weight: bold; font-size: 16px; display: block; color: var(--blue); }
        #map { height: calc(100vh - 170px); width: 100%; }
        #store-list { height: calc(100vh - 170px); overflow-y: auto; display: none; background: white; padding-bottom: 80px; }
        .store-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .store-card:active { background: #f0f0f0; }
        .tabs { display: flex; background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; height: 60px; z-index: 1000; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: none; font-size: 12px; color: #888; font-weight: bold; }
        .tab.active { color: var(--blue); border-top: 3px solid var(--blue); background: #f9f9f9; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: white; width: 85%; max-width: 400px; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .badge { background: #fff3cd; border: 2px dashed #ffc107; padding: 15px; margin: 15px 0; border-radius: 10px; font-size: 22px; font-weight: bold; color: #856404; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 14px; text-transform: uppercase; }
    </style>
</head>

    <div class="stat-item"><span class="stat-val" id="stat-total">0</span>LOJAS</div>
    <div class="stat-item"><span class="stat-val" id="stat-feitas" style="color:var(--green)">0</span>FEITAS</div>
    <div class="stat-item"><span class="stat-val" id="stat-pct">0%</span>MÉDIA</div>
</div>

<div id="map"></div>
<div id="store-list"></div>

<div class="modal" id="modal">

        <h3 id="m-nome">---</h3>
        <p id="m-morada" style="font-size: 13px; color: #666;"></p>
        <div class="badge"><small style="font-size: 10px; display: block; margin-bottom: 5px;">ID POSTO:</small><span id="m-posto">---</span></div>
        <button class="btn" style="background: var(--blue); color: white;" onclick="abrirRota()">🧭 IR PARA LOJA (WAZE/MAPS)</button>
        <button id="btn-concluir" class="btn" style="background: var(--green); color: white;" onclick="marcarFeito()">✅ CONCLUÍDO</button>
        <button class="btn" style="background: #eee; color: #333;" onclick="fecharModal()">VOLTAR</button>
    </div>
</div>

<div class="tabs">

    <button class="tab" id="tab-lista" onclick="switchTab('lista')">📋 LISTA</button>

    let map, markers = {}, statusRealtime = {}, lojaAtiva = null;

    function initMap() {
        // Inicia o mapa centrado em Portugal
        map = L.map('map', { zoomControl: false }).setView([39.5, -8.5], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Criar marcadores
        baseLojas.forEach(s => {
            const m = L.circleMarker([s.lat, s.lon], {
                radius: 10, color: 'white', weight: 2, fillColor: '#df0000', fillOpacity: 0.9
            }).addTo(map);
            m.on('click', () => abrirLoja(s));
            markers[s.id] = m;
        });

        ouvirFirebase();
    }

    function ouvirFirebase() {
        db.ref('fase2').on('value', snap => {
            statusRealtime = snap.val() || {};
            atualizarUI();
        });
    }

    function atualizarUI() {
        let feitas = 0;
        
        // Atualiza Marcadores no Mapa
        baseLojas.forEach(s => {
            const isFeito = statusRealtime[s.id] === 'OK';
            if(isFeito) {
                feitas++;
                if(markers[s.id]) markers[s.id].setStyle({fillColor: '#28a745'});
            } else {
                if(markers[s.id]) markers[s.id].setStyle({fillColor: '#df0000'});
            }
        });

        // Estatísticas
        document.getElementById('stat-total').innerText = baseLojas.length;
        document.getElementById('stat-feitas').innerText = feitas;
        document.getElementById('stat-pct').innerText = Math.round((feitas/baseLojas.length)*100) + '%';

        // Lista
        document.getElementById('store-list').innerHTML = baseLojas.map(s => `
            <div class="store-card" onclick='abrirLoja(${JSON.stringify(s)})'>
                <div><strong>${s.id} - ${s.n}</strong><br><small style="color:#666">${s.p}</small></div>
                <div style="font-size: 20px; color:${statusRealtime[s.id] === 'OK' ? 'var(--green)' : '#ccc'}">●</div>
            </div>
        `).join('');
    }

    function abrirLoja(s) {
        lojaAtiva = s;
        document.getElementById('m-nome').innerText = s.n;
        document.getElementById('m-morada').innerText = s.m;
        document.getElementById('m-posto').innerText = s.p;
        
        const btn = document.getElementById('btn-concluir');
        if(statusRealtime[s.id] === 'OK') {
            btn.innerText = "REVER (ESTÁ CONCLUÍDO)";
            btn.style.background = "#666";
        } else {
            btn.innerText = "MARCAR COMO CONCLUÍDO";
            btn.style.background = "var(--green)";
        }
        
        document.getElementById('modal').style.display = 'flex';
    }

    function marcarFeito() {
        if(lojaAtiva) {
            const novoEstado = statusRealtime[lojaAtiva.id] === 'OK' ? null : 'OK';
            db.ref('fase2/' + lojaAtiva.id).set(novoEstado);
            fecharModal();
        }
    }

    function abrirRota() {
        if(lojaAtiva) {
            // Tenta abrir no Waze/Google Maps
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lojaAtiva.lat},${lojaAtiva.lon}`);
        }
    }

    function fecharModal() { document.getElementById('modal').style.display = 'none'; }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        
        document.getElementById('map').style.display = tab === 'mapa' ? 'block' : 'none';
        document.getElementById('store-list').style.display = tab === 'lista' ? 'block' : 'none';
        
        if(tab === 'mapa') {
            setTimeout(() => map.invalidateSize(), 100);
        }
    }

    window.onload = initMap;
</script>

</body>
</html>
