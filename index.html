<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI - Gestão Multi-Equipa</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --blue: #0050aa; --yellow: #ffcc00; --red: #df0000; --green: #28a745; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; flex-direction: column; overflow: hidden; }
        
        #header { background: var(--blue); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #equipaNome { padding: 8px; border-radius: 4px; border: none; width: 150px; font-weight: bold; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        #sidebar { width: 380px; border-right: 1px solid #ccc; display: flex; flex-direction: column; background: #fff; }
        .tab-bar { display: flex; background: #eee; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; }
        .tab.active { background: white; border-bottom: 3px solid var(--yellow); color: var(--blue); }
        
        #store-list { flex: 1; overflow-y: auto; padding: 10px; background: #f4f4f4; }
        .store-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; border-left: 6px solid #ccc; position: relative; }
        .status-badge { position: absolute; right: 10px; top: 10px; font-size: 9px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .dist-info { font-size: 11px; color: #666; font-weight: bold; margin-top: 5px; display: block; }

        #map { flex: 1; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-box { background:white; width:90%; max-width:400px; padding:25px; border-radius:15px; text-align: center; }
        .timer { font-size: 42px; font-weight: bold; margin: 20px 0; color: var(--blue); font-family: monospace; }
        .btn { padding: 15px; width: 100%; margin: 8px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div id="header">
    <div>
        <h2 style="margin:0; font-size: 18px;">QUANTUM AI PRO</h2>
        <small id="gps-status">GPS: Procurando...</small>
    </div>
    <input type="text" id="equipaNome" placeholder="Nome da Equipa">
</div>

<div id="main-container">
    <div id="sidebar">
        <div class="tab-bar">
            <div id="tab-todas" class="tab active" onclick="changeTab('todas')">TODAS</div>
            <div id="tab-perto" class="tab" onclick="changeTab('perto')">PERTO</div>
            <div id="tab-curso" class="tab" onclick="changeTab('curso')">EM CURSO</div>
        </div>
        <div id="store-list">Sincronizando...</div>
    </div>
    <div id="map"></div>
</div>

<div id="modalTrabalho" class="modal">
    <div class="modal-box">
        <h2 id="m-nome" style="color: var(--blue); margin: 0;">Loja</h2>
        <p id="m-morada" style="font-size: 12px; color: #666;"></p>
        <div id="timer" class="timer">00:00:00</div>
        <div id="status-info" style="margin-bottom: 20px; font-size: 14px; font-weight: bold;"></div>
        
        <button class="btn" style="background: var(--green); color:white;" id="btnStart" onclick="dbAction('start')">INICIAR TRABALHO</button>
        <button class="btn" style="background: var(--yellow);" id="btnPause" onclick="dbAction('pause')">PAUSA / ALMOÇO</button>
        <button class="btn" style="background: var(--red); color:white;" id="btnFinish" onclick="dbAction('finish')">FINALIZAR TAREFA</button>
        <button class="btn" style="background: #eee;" onclick="closeModal()">VOLTAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBdQpPtOWd6kPZfa0ofvrjpoa-XqXgP_tY",
        authDomain: "lidl-audit.firebaseapp.com",
        databaseURL: "https://lidl-audit-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lidl-audit",
        storageBucket: "lidl-audit.firebasestorage.app",
        messagingSenderId: "913435364403",
        appId: "1:913435364403:web:b46e176fd05ad7daaa6746"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map').setView([39.5, -8.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let baseLojas = [];
    let statusRealtime = {};
    let lojaAtiva = null;
    let userPos = null;
    let currentTab = 'todas';

    Papa.parse("https://raw.githubusercontent.com/rikson-matos/lidl/main/lista_final.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            baseLojas = results.data;
            iniciarSincronizacao();
            monitorarGPS();
        }
    });

    function iniciarSincronizacao() {
        db.ref('trabalhos').on('value', snapshot => {
            statusRealtime = snapshot.val() || {};
            renderList();
        });
    }

    function monitorarGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                document.getElementById('gps-status').innerText = "GPS: OK";
                if(currentTab === 'perto') renderList();
            });
        }
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI / 180;
        const dLon = (lon2-lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function changeTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        renderList();
    }

    function renderList() {
        const container = document.getElementById('store-list');
        container.innerHTML = '';
        let lojasParaExibir = [...baseLojas];

        if (userPos) {
            lojasParaExibir.forEach((l, i) => {
                l.dist = calcDist(userPos.lat, userPos.lon, parseFloat(l.Latitude), parseFloat(l.Longitude));
                l.originalIndex = i;
            });
            if (currentTab === 'perto') lojasParaExibir.sort((a, b) => a.dist - b.dist);
        }

        lojasParaExibir.forEach((loja, idx) => {
            const id = "loja_" + (loja.originalIndex !== undefined ? loja.originalIndex : idx);
            const status = statusRealtime[id] || { estado: 'LIVRE' };
            if(currentTab === 'curso' && status.estado !== 'EM_CURSO') return;

            const div = document.createElement('div');
            div.className = 'store-item';
            div.style.borderLeftColor = status.estado === 'EM_CURSO' ? 'var(--yellow)' : (status.estado === 'CONCLUIDO' ? 'var(--green)' : '#ccc');
            
            div.innerHTML = `
                <b>${loja.Nome}</b><br><small>${loja.Morada}</small>
                ${loja.dist ? `<span class="dist-info">📍 ${loja.dist.toFixed(1)} km</span>` : ''}
                <span class="status-badge" style="background:${status.estado === 'EM_CURSO' ? 'var(--yellow)' : (status.estado === 'CONCLUIDO' ? 'var(--green)' : '#eee')}">
                    ${status.estado}
                </span>`;
            
            div.onclick = () => abrirLoja(id, loja);
            container.appendChild(div);
        });
    }

    function abrirLoja(id, loja) {
        lojaAtiva = { id, ...loja };
        document.getElementById('m-nome').innerText = "LIDL " + loja.Nome;
        document.getElementById('m-morada').innerText = loja.Morada;
        document.getElementById('modalTrabalho').style.display = 'flex';
        
        const status = statusRealtime[id] || {};
        const info = document.getElementById('status-info');
        info.innerText = status.estado === 'EM_CURSO' ? `EM CURSO POR: ${status.equipa}` : (status.estado === 'CONCLUIDO' ? `FINALIZADO POR: ${status.equipa}` : "DISPONÍVEL");
        info.style.color = status.estado === 'EM_CURSO' ? 'var(--blue)' : (status.estado === 'CONCLUIDO' ? 'var(--green)' : '#666');
        
        map.setView([loja.Latitude, loja.Longitude], 15);
    }

    function dbAction(acao) {
        const equipa = document.getElementById('equipaNome').value;
        if(!equipa) return alert("Insere o nome da Equipa no topo!");
        const ref = db.ref('trabalhos/' + lojaAtiva.id);
        
        if(acao === 'start') {
            ref.set({ estado: 'EM_CURSO', equipa: equipa, inicio: Date.now() });
            closeModal(); // FECHA AUTOMATICAMENTE APÓS INICIAR
        } else if(acao === 'finish') {
            ref.update({ estado: 'CONCLUIDO', fim: Date.now() });
            closeModal();
        }
    }

    function closeModal() { document.getElementById('modalTrabalho').style.display = 'none'; }
</script>
</body>
</html>
