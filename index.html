<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIDL - Correção de IDs</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --blue: #0050aa; --yellow: #ffcc00; --red: #df0000; --green: #28a745; --dark: #333; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; overflow: hidden; }
        #header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stats-bar { display: flex; background: white; padding: 10px; border-bottom: 2px solid var(--yellow); }
        .stat-item { text-align: center; flex: 1; font-size: 12px; }
        .stat-val { font-weight: bold; font-size: 16px; display: block; color: var(--blue); }
        #map { height: calc(100vh - 175px); width: 100%; }
        #store-list { height: calc(100vh - 175px); overflow-y: auto; display: none; background: white; }
        .store-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; height: 60px; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: none; font-size: 12px; color: #888; }
        .tab.active { color: var(--blue); border-top: 3px solid var(--blue); }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; text-align: center; }
        .badge { background: #fff3cd; border: 2px dashed #ffc107; padding: 15px; margin: 15px 0; border-radius: 10px; font-size: 24px; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="header"><strong>LIDL FASE 2</strong><span>Operador</span></div>

<div class="stats-bar">
    <div class="stat-item"><span class="stat-val" id="stat-total">0</span>Total</div>
    <div class="stat-item"><span class="stat-val" id="stat-feitas" style="color:var(--green)">0</span>Feitas</div>
    <div class="stat-item"><span class="stat-val" id="stat-pct">0%</span>Progresso</div>
</div>

<div id="map"></div>
<div id="store-list"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="m-nome">Loja</h3>
        <p id="m-morada" style="font-size: 12px; color: #666;"></p>
        <div class="badge"><small style="font-size: 10px; display: block;">COLAR VINIL Nº:</small><span id="m-posto">---</span></div>
        <button class="btn" style="background: var(--blue); color: white;" onclick="abrirRota()">🧭 VER NO MAPA</button>
        <button id="btn-acao" class="btn" style="background: var(--green); color: white;" onclick="concluir()">MARCAR COMO FEITO</button>
        <button class="btn" style="background: #eee;" onclick="fecharModal()">FECHAR</button>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('mapa', this)">🗺️ MAPA</button>
    <button class="tab" onclick="switchTab('lista', this)">📋 LISTA</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- COLOQUE SEUS DADOS DO FIREBASE AQUI ---
    const firebaseConfig = { databaseURL: "https://SEU-PROJETO.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, stores = [], statusRealtime = {}, lojaAtiva = null;

    async function carregarDados() {
        try {
            const r = await fetch('lista_correcao.csv?v=' + Date.now());
            const txt = await r.text();
            const linhas = txt.split('\n').filter(l => l.trim().length > 0);
            
            stores = linhas.slice(1).map(linha => {
                const c = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Regex para lidar com vírgulas em moradas
                return {
                    id: c[0].trim(),
                    nome: c[1].trim(),
                    posto: c[2].trim(),
                    morada: c[3].replace(/"/g, '').trim(),
                    lat: parseFloat(c[4]),
                    lon: parseFloat(c[5])
                };
            }).filter(s => !isNaN(s.lat));

            initMap();
            ouvirFirebase();
        } catch (e) { alert("Erro ao carregar lista_correcao.csv"); }
    }

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([38.74, -9.14], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    function ouvirFirebase() {
        db.ref('fase2').on('value', snap => {
            statusRealtime = snap.val() || {};
            atualizarInterface();
        });
    }

    function atualizarInterface() {
        const feitas = Object.values(statusRealtime).filter(v => v === 'OK').length;
        document.getElementById('stat-total').innerText = stores.length;
        document.getElementById('stat-feitas').innerText = feitas;
        document.getElementById('stat-pct').innerText = Math.round((feitas/stores.length)*100) + '%';

        // Atualizar Marcadores
        map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });
        stores.forEach(s => {
            const feito = statusRealtime[s.id] === 'OK';
            const marker = L.circleMarker([s.lat, s.lon], {
                radius: 10, color: 'white', weight: 2, fillColor: feito ? '#28a745' : '#df0000', fillOpacity: 0.9
            }).addTo(map);
            marker.on('click', () => abrirLoja(s));
        });

        // Atualizar Lista
        document.getElementById('store-list').innerHTML = stores.map(s => `
            <div class="store-card" onclick='abrirLoja(${JSON.stringify(s)})'>
                <div><strong>${s.nome}</strong><br><small>${s.posto}</small></div>
                <div style="color:${statusRealtime[s.id] === 'OK' ? 'green' : '#ccc'}">●</div>
            </div>
        `).join('');
    }

    function abrirLoja(s) {
        lojaAtiva = s;
        document.getElementById('m-nome').innerText = s.nome;
        document.getElementById('m-morada').innerText = s.morada;
        document.getElementById('m-posto').innerText = s.posto;
        document.getElementById('modal').style.display = 'flex';
    }

    function concluir() {
        if(lojaAtiva) {
            db.ref('fase2/' + lojaAtiva.id).set('OK');
            fecharModal();
        }
    }

    function abrirRota() {
        window.open(`https://www.google.com/maps?q=${lojaAtiva.lat},${lojaAtiva.lon}`);
    }

    function fecharModal() { document.getElementById('modal').style.display = 'none'; }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('map').style.display = tab === 'mapa' ? 'block' : 'none';
        document.getElementById('store-list').style.display = tab === 'lista' ? 'block' : 'none';
        if(tab === 'mapa') map.invalidateSize();
    }

    carregarDados();
</script>
</body>
</html>
