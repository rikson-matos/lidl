<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDL - Quantum AI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .header {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 12px 25px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: bold; color: #0050aa; border: 2px solid #ffcc00;
        }
    </style>
</head>
<body>

    <div class="header">LIDL - 299 Lojas (Quantum AI)</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // Inicializa o mapa focado em Portugal
        const map = L.map('map').setView([39.5, -8.0], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Carrega o CSV diretamente do teu GitHub
        Papa.parse("lista_final.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(loja => {
                    const lat = parseFloat(loja.Latitude);
                    const lng = parseFloat(loja.Longitude);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        L.marker([lat, lng])
                            .addTo(map)
                            .bindPopup(`
                                <div style="text-align: center;">
                                    <b style="color: #0050aa;">LIDL ${loja.Nome}</b><br>
                                    <span style="font-size: 12px;">${loja.Morada}</span><br>
                                    <hr>
                                    <small>Código: ${loja.Código} | Regional: ${loja.Regional}</small>
                                </div>
                            `);
                    }
                });
            }
        });
    </script>
</body>
</html>
