<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum AI PRO - Fleet Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --blue: #0050aa; --yellow: #ffcc00; --red: #df0000; --green: #28a745; --dark: #333; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; overflow: hidden; }
        
        #header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .stats-bar { display: flex; background: white; padding: 10px; gap: 10px; justify-content: space-around; font-size: 12px; color: var(--dark); border-bottom: 2px solid var(--yellow); }
        .stat-item { text-align: center; flex: 1; }
        .stat-val { font-weight: bold; font-size: 16px; display: block; color: var(--blue); }

        #map { height: calc(100vh - 180px); width: 100%; }
        #store-list { height: calc(100vh - 180px); overflow-y: auto; display: none; background: white; }
        
        .store-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .store-info h4 { margin: 0 0 5px 0; color: var(--blue); }
        .store-info p { margin: 0; font-size: 12px; color: #666; }
        
        .tabs { display: flex; background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; height: 60px; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #888; text-decoration: none; border: none; background: none; }
        .tab.active { color: var(--blue); border-top: 3px solid var(--blue); }
        
        .btn-check { padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-pendente { background: #eee; color: #666; }
        .btn-concluido { background: var(--green); color: white; }
    </style>
</head>
<body>

<div id="header">
    <strong>Quantum AI PRO</strong>
    <span id="user-name">Operador</span>
</div>

<div class="stats-bar">
    <div class="stat-item"><span class="stat-val" id="stat-total">112</span>Total</div>
    <div class="stat-item"><span class="stat-val" id="stat-feitas">0</span>Feitas</div>
    <div class="stat-item"><span class="stat-val" id="stat-pct">0%</span>Progresso</div>
</div>

<div id="map"></div>
<div id="store-list"></div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('mapa', this)">🗺️ Mapa</button>
    <button class="tab" onclick="switchTab('lista', this)">📋 Lista</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, markers = {}, stores = [];
    let statusRealtime = JSON.parse(localStorage.getItem('fleet_status') || '{}');

    async function init() {
        map = L.map('map').setView([39.5, -8.5], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const response = await fetch('lista_correcao.csv');
        const data = await response.text();
        const rows = data.split('\n').slice(1);

        rows.forEach(row => {
            const [id, nome, posto, morada, lat, lon] = row.split(',');
            if(!lat || !lon) return;

            const store = { id, nome, posto, morada, lat: parseFloat(lat), lon: parseFloat(lon) };
            stores.push(store);

            const estado = statusRealtime[id] || 'PENDENTE';
            const color = estado === 'CONCLUIDO' ? '#28a745' : '#0050aa';

            const marker = L.circleMarker([store.lat, store.lon], {
                radius: 8, color: 'white', weight: 2, fillColor: color, fillOpacity: 1
            }).addTo(map);

            marker.bindPopup(`<b>${nome}</b><br>${posto}<br><button onclick="toggleStore('${id}')">Alterar Estado</button>`);
            markers[id] = marker;
        });
        atualizarStats();
        renderList();
    }

    function toggleStore(id) {
        statusRealtime[id] = statusRealtime[id] === 'CONCLUIDO' ? 'PENDENTE' : 'CONCLUIDO';
        localStorage.setItem('fleet_status', JSON.stringify(statusRealtime));
        
        const color = statusRealtime[id] === 'CONCLUIDO' ? '#28a745' : '#0050aa';
        markers[id].setStyle({ fillColor: color });
        
        atualizarStats();
        renderList();
    }

    function renderList() {
        const container = document.getElementById('store-list');
        container.innerHTML = stores.map(s => `
            <div class="store-card">
                <div class="store-info">
                    <h4>${s.nome}</h4>
                    <p>${s.posto} | ${s.morada}</p>
                </div>
                <button class="btn-check ${statusRealtime[s.id] === 'CONCLUIDO' ? 'btn-concluido' : 'btn-pendente'}" 
                        onclick="toggleStore('${s.id}')">
                    ${statusRealtime[s.id] === 'CONCLUIDO' ? '✅' : '⏳'}
                </button>
            </div>
        `).join('');
    }

    function atualizarStats() {
        const feitas = Object.values(statusRealtime).filter(v => v === 'CONCLUIDO').length;
        document.getElementById('stat-feitas').innerText = feitas;
        document.getElementById('stat-pct').innerText = Math.round((feitas/112)*100) + '%';
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('map').style.display = tab === 'mapa' ? 'block' : 'none';
        document.getElementById('store-list').style.display = tab === 'lista' ? 'block' : 'none';
        if(tab === 'mapa') map.invalidateSize();
    }

    init();
</script>
</body>
</html>
